<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Custodia Silentis</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #111;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .wrap {
    text-align: center;
    padding: 60px 28px;
    max-width: 640px;
  }
  .num {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 180px;
    line-height: 1;
    color: rgba(197, 165, 90, 0.9);
    letter-spacing: -0.02em;
    margin-bottom: 40px;
  }
  .msg {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 30px;
    line-height: 1.35;
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 56px;
    letter-spacing: -0.005em;
  }
  .back {
    display: inline-block;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(197, 165, 90, 0.95);
    text-decoration: none;
    border-bottom: 1px solid rgba(197, 165, 90, 0.5);
    padding-bottom: 6px;
    transition: color 0.2s, border-color 0.2s;
  }
  .back:hover {
    color: #fff;
    border-color: #fff;
  }
  @media (max-width: 600px) {
    .num { font-size: 110px; margin-bottom: 32px; }
    .msg { font-size: 22px; margin-bottom: 40px; }
    .back { font-size: 13px; letter-spacing: 0.16em; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="num">404</div>
    <p class="msg">Этой страницы нет.<br>Или больше нет.</p>
    <a href="/" class="back">На главную</a>
  </div>
</body>
</html>
